name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  claude-review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Review
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          git fetch origin main

          claude --agent code-reviewer \
            -p "审查当前分支 (${{ github.head_ref }}) 相对于 origin/main 的所有代码改动。PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}" \
            > /tmp/review-result.txt 2>&1

      - name: Post Claude Review Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(cat <<EOF
          ## Claude Code Review

          $(cat /tmp/review-result.txt)

          ---
          *Powered by Claude Code (Haiku, Subagent Mode)*
          EOF
          )
          gh pr comment ${{ github.event.pull_request.number }} --body "$BODY"

  codex-review:
    name: Codex Code Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Configure Codex
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          mkdir -p ~/.codex
          cat > ~/.codex/config.toml << 'TOML'
          model_provider = "relay"
          model = "gpt-5.3-codex-spark"
          preferred_auth_method = "apikey"

          [model_providers.relay]
          name = "relay"
          base_url = "https://ccc.210k.cc/openai"
          wire_api = "responses"
          requires_openai_auth = true
          TOML
          echo "{\"OPENAI_API_KEY\": \"$OPENAI_API_KEY\"}" > ~/.codex/auth.json

      - name: Run Codex Review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          git fetch origin main
          codex review --base origin/main > /tmp/codex-raw.txt 2>&1 || true
          tac /tmp/codex-raw.txt | sed '/^codex$/q' | tac | sed '1d' > /tmp/codex-review-result.txt

      - name: Post Codex Review Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(cat <<EOF
          ## Codex Code Review

          $(cat /tmp/codex-review-result.txt)

          ---
          *Powered by OpenAI Codex (gpt-5.3-codex-spark)*
          EOF
          )
          gh pr comment ${{ github.event.pull_request.number }} --body "$BODY"
