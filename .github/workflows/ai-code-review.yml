name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Get PR Diff
        run: |
          gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }} > /tmp/pr_diff.txt

      - name: Read Context Files
        run: |
          echo "=== README ===" > /tmp/context.txt
          cat README.md >> /tmp/context.txt 2>/dev/null || true
          echo -e "\n=== src/main.py ===" >> /tmp/context.txt
          cat src/main.py >> /tmp/context.txt 2>/dev/null || true

      - name: AI Code Review
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
        run: |
          CONTENT=$(cat /tmp/context.txt)
          DIFF=$(cat /tmp/pr_diff.txt)

          USER_MSG="项目上下文：
$CONTENT

PR 改动：
$DIFF

请审查 PR 改动，以 Markdown 格式输出。"

          RESPONSE=$(curl -s "https://ccc.210k.cc/v1/messages" \
            -H "Authorization: Bearer $ANTHROPIC_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -H "anthropic-version: 2023-06-01" \
            -d '{
              "model": "claude-haiku-4-5-20251001",
              "max_tokens": 2000,
              "system": "你是代码审查专家",
              "messages": [{"role": "user", "content": '"$(echo "$USER_MSG" | jq -Rs .)"'}]}')

          AI_REVIEW=$(echo "$RESPONSE" | jq -r '.content[0].text // .error.message // .')
          echo "$AI_REVIEW" > /tmp/ai_review.txt

      - name: Post Review Comment
        if: success()
        run: |
          AI_REVIEW=$(cat /tmp/ai_review.txt)
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "## AI Code Review

${AI_REVIEW}

---
*Generated by AI*"
