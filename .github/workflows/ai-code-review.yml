name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  claude-review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Get PR Info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr-diff.txt
          gh pr view ${{ github.event.pull_request.number }} \
            --json title,body --jq '"Title: \(.title)\nDescription: \(.body)"' > /tmp/pr-info.txt
          truncate -s '<60000' /tmp/pr-diff.txt

      - name: Run Claude Review
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cat > /tmp/review-prompt.txt << 'PROMPT_END'
          你是一位资深代码审查专家。请审查以下 PR 的改动，用中文输出，格式如下：

          ## 变更摘要
          简要说明这个 PR 做了什么（1-3 句话）

          ## 潜在问题
          列出你发现的 bug、安全隐患、性能问题等（如果没有就写"未发现明显问题"）

          ## 改进建议
          给出具体可操作的优化建议（如果没有就写"暂无"）

          ## 总体评价
          用一句话总结你对这个 PR 的评价
          ---
          以下是 PR 信息和 diff：
          PROMPT_END

          cat /tmp/pr-info.txt >> /tmp/review-prompt.txt
          echo -e "\n\n--- Diff ---\n" >> /tmp/review-prompt.txt
          cat /tmp/pr-diff.txt >> /tmp/review-prompt.txt

          REVIEW=$(claude -p "$(cat /tmp/review-prompt.txt)" \
            --model claude-haiku-4-5-20251001)

          echo "$REVIEW" > /tmp/review-result.txt

      - name: Post Claude Review Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(cat <<EOF
          ## Claude Code Review

          $(cat /tmp/review-result.txt)

          ---
          *Powered by Claude Code (Haiku)*
          EOF
          )
          gh pr comment ${{ github.event.pull_request.number }} --body "$BODY"

  codex-review:
    name: Codex Code Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Configure Codex
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          mkdir -p ~/.codex
          cat > ~/.codex/config.toml << 'TOML'
          model_provider = "relay"
          model = "gpt-5.3-codex-spark"
          preferred_auth_method = "apikey"

          [model_providers.relay]
          name = "relay"
          base_url = "https://ccc.210k.cc/openai"
          wire_api = "responses"
          requires_openai_auth = true
          TOML
          echo "{\"OPENAI_API_KEY\": \"$OPENAI_API_KEY\"}" > ~/.codex/auth.json

      - name: Run Codex Review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          git fetch origin main
          REVIEW=$(codex review --base origin/main 2>&1 | tail -n +2)
          echo "$REVIEW" > /tmp/codex-review-result.txt

      - name: Post Codex Review Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(cat <<EOF
          ## Codex Code Review

          $(cat /tmp/codex-review-result.txt)

          ---
          *Powered by OpenAI Codex (gpt-5.3-codex-spark)*
          EOF
          )
          gh pr comment ${{ github.event.pull_request.number }} --body "$BODY"
