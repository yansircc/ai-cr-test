name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Get PR Info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 获取 PR diff
          gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr-diff.txt

          # 获取 PR 标题和描述
          gh pr view ${{ github.event.pull_request.number }} \
            --json title,body --jq '"Title: \(.title)\nDescription: \(.body)"' > /tmp/pr-info.txt

          # 截断过大的 diff（保留前 60KB，避免 token 超限）
          truncate -s '<60000' /tmp/pr-diff.txt

      - name: Run AI Code Review
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # 构造 prompt 文件，避免命令行参数过长
          cat > /tmp/review-prompt.txt << 'PROMPT_END'
          你是一位资深代码审查专家。请审查以下 PR 的改动，用中文输出，格式如下：

          ## 变更摘要
          简要说明这个 PR 做了什么（1-3 句话）

          ## 潜在问题
          列出你发现的 bug、安全隐患、性能问题等（如果没有就写"未发现明显问题"）

          ## 改进建议
          给出具体可操作的优化建议（如果没有就写"暂无"）

          ## 总体评价
          用一句话总结你对这个 PR 的评价

          ---
          以下是 PR 信息和 diff：

          PROMPT_END

          # 拼接 PR 信息和 diff
          cat /tmp/pr-info.txt >> /tmp/review-prompt.txt
          echo -e "\n\n--- Diff ---\n" >> /tmp/review-prompt.txt
          cat /tmp/pr-diff.txt >> /tmp/review-prompt.txt

          # 调用 Claude Code CLI
          REVIEW=$(claude -p "$(cat /tmp/review-prompt.txt)" \
            --model claude-haiku-4-5-20251001)

          echo "$REVIEW" > /tmp/review-result.txt

      - name: Post Review Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REVIEW=$(cat /tmp/review-result.txt)

          # 使用 heredoc 避免变量中的特殊字符问题
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "$(cat <<EOF
          ## AI Code Review

          ${REVIEW}

          ---
          *Powered by Claude Code (Haiku) via CI*
          EOF
          )"
