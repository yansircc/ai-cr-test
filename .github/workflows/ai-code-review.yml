name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Get PR Diff
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DIFF=$(gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }})
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Read Context Files
        id: context
        run: |
          CONTEXT_FILES="README.md src/main.py"
          CONTENT=""

          for file in $CONTEXT_FILES; do
            if [ -f "$file" ]; then
              CONTENT="$CONTENT

--- 文件: $file ---
$(cat "$file")"
            fi
          done
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: AI Code Review
        id: review
        env:
          ANTHROPIC_BASE_URL: "https://ccc.210k.cc"
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
        run: |
          # 使用 heredoc 避免 JSON 转义问题
          cat > /tmp/review.json << 'JSONEOF'
          {
            "model": "claude-haiku-4-5-20251001",
            "max_tokens": 2000,
            "system": "你是一个资深的代码审查专家。请根据项目上下文文件理解项目架构和规范，然后审查 PR 改动。",
            "messages": [{"role": "user", "content": "## 项目上下文（供参考）\n${{ steps.context.outputs.content }}\n\n## PR 改动（Diff）\n${{ steps.diff.outputs.diff }}\n\n请审查以上 PR 改动，以 Markdown 格式输出审查意见。重点关注：\n1. 代码风格是否与项目一致\n2. 是否有潜在 bug\n3. 是否有重复逻辑\n4. 可以改进的地方"}]
          }
          JSONEOF

          RESPONSE=$(curl -s "$ANTHROPIC_BASE_URL/v1/messages" \
            -H "Authorization: Bearer $ANTHROPIC_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -H "anthropic-version: 2023-06-01" \
            -d @/tmp/review.json)

          echo "$RESPONSE" > /tmp/response.json

          AI_REVIEW=$(cat /tmp/response.json | jq -r '.content[0].text // empty')

          if [ -z "$AI_REVIEW" ]; then
            AI_REVIEW=$(cat /tmp/response.json | jq -r '.error.message // .')
          fi

          echo "=== AI Review Result ==="
          echo "$AI_REVIEW"

          # 保存结果（使用 base64 避免特殊字符问题）
          echo "$AI_REVIEW" | base64 > /tmp/ai_review.txt

      - name: Post Review Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          AI_REVIEW=$(cat /tmp/ai_review.txt | base64 -d)

          COMMENT_BODY="## 🤖 AI Code Review

${AI_REVIEW}

---
*This review was generated by AI*"

          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "$COMMENT_BODY"
