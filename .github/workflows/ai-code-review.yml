name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get PR Diff
        run: |
          gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }} > /tmp/diff.txt
          echo "Diff saved: $(wc -l < /tmp/diff.txt) lines"

      - name: Get Context
        run: |
          echo "README:" > /tmp/context.txt
          cat README.md >> /tmp/context.txt 2>/dev/null || echo "not found" >> /tmp/context.txt
          echo "main.py:" >> /tmp/context.txt
          cat src/main.py >> /tmp/context.txt 2>/dev/null || echo "not found" >> /tmp/context.txt

      - name: Call Claude API
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
        run: |
          DIFF=$(cat /tmp/diff.txt)
          CTX=$(cat /tmp/context.txt)

          curl -s "https://ccc.210k.cc/v1/messages" \
            -H "Authorization: Bearer $ANTHROPIC_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -H "anthropic-version: 2023-06-01" \
            -d "{
              \"model\": \"claude-haiku-4-5-20251001\",
              \"max_tokens\": 1000,
              \"messages\": [
                {\"role\": \"system\", \"content\": \"你是一个代码审查专家\"},
                {\"role\": \"user\", \"content\": \"PR改动:\\n$DIFF\\n\\n项目上下文:\\n$CTX\"}
              ]
            }" > /tmp/response.json

          cat /tmp/response.json | jq -r '.content[0].text // .error.message' > /tmp/review.txt

      - name: Post Review
        run: |
          REVIEW=$(cat /tmp/review.txt)
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "## AI Code Review

$REVIEW

---
*AI generated*"
