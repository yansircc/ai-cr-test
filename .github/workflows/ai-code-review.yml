name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Get PR Diff
        id: diff
        run: |
          DIFF=$(gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }} 2>/dev/null || echo "")
          echo "diff=$DIFF" >> $GITHUB_OUTPUT

      - name: Read Context Files
        id: context
        run: |
          # 读取需要参考的上下文文件
          CONTEXT_FILES="README.md src/main.py"
          CONTENT=""

          for file in $CONTEXT_FILES; do
            if [ -f "$file" ]; then
              CONTENT="$CONTENT\n\n--- 文件: $file ---\n$(cat $file)"
            fi
          done
          echo "content=$CONTENT" >> $GITHUB_OUTPUT

      - name: AI Code Review
        id: review
        env:
          ANTHROPIC_BASE_URL: "https://ccc.210k.cc"
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # 获取 Diff 和 Context
          DIFF="${{ steps.diff.outputs.diff }}"
          CONTEXT="${{ steps.context.outputs.content }}"

          # 调用 Claude API
          RESPONSE=$(curl -s "$ANTHROPIC_BASE_URL/v1/messages" \
            -H "Authorization: Bearer $ANTHROPIC_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -H "anthropic-version: 2023-06-01" \
            -d "{
              \"model\": \"claude-haiku-4-5-20251001\",
              \"max_tokens\": 2000,
              \"system\": \"你是一个资深的代码审查专家。请根据项目上下文文件理解项目架构和规范，然后审查 PR 改动。\",
              \"messages\": [{\"role\": \"user\", \"content\": \"## 项目上下文（供参考）\n$CONTEXT\n\n## PR 改动（Diff）\n$DIFF\n\n请审查以上 PR 改动，以 Markdown 格式输出审查意见。重点关注：\n1. 代码风格是否与项目一致\n2. 是否有潜在 bug\n3. 是否有重复逻辑\n4. 可以改进的地方\"}]
            }")

          # 提取 AI 回复
          AI_REVIEW=$(echo "$RESPONSE" | jq -r '.content[0].text' 2>/dev/null || echo "$RESPONSE")

          echo "=== AI Review Result ==="
          echo "$AI_REVIEW"
          echo "ai_review=$AI_REVIEW" >> $GITHUB_OUTPUT

      - name: Post Review Comment
        if: steps.review.outputs.ai_review != ''
        run: |
          COMMENT_BODY='## 🤖 AI Code Review

${{ steps.review.outputs.ai_review }}

---
*This review was generated by AI*'

          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "$COMMENT_BODY"
