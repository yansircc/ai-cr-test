name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Get PR Diff
        run: |
          gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }} > /tmp/pr_diff.txt
          ls -la /tmp/pr_diff.txt

      - name: AI Code Review
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
        run: |
          # 直接使用简化的 prompt
          DATA='{"model":"claude-haiku-4-5-20251001","max_tokens":500,"messages":[{"role":"user","content":"Review this PR diff in 2-3 sentences:"}]}'

          RESPONSE=$(curl -s "https://ccc.210k.cc/v1/messages" \
            -H "Authorization: Bearer $ANTHROPIC_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -H "anthropic-version: 2023-06-01" \
            -d "$DATA")

          echo "Response: $RESPONSE"
          echo "$RESPONSE" > /tmp/resp.json

          AI_REVIEW=$(cat /tmp/resp.json | jq -r '.content[0].text // .error.message // empty')
          echo "Review: $AI_REVIEW"
          echo "$AI_REVIEW" > /tmp/ai_review.txt

      - name: Post Review Comment
        if: success()
        run: |
          AI_REVIEW=$(cat /tmp/ai_review.txt)
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "## AI Code Review

$AI_REVIEW

---
*Generated by AI*"
