name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Get PR Diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }} > /tmp/pr_diff.txt
          echo "Diff saved, length: $(wc -c < /tmp/pr_diff.txt) bytes"

      - name: Read Context Files
        run: |
          echo "=== README.md ===" > /tmp/context.txt
          cat README.md >> /tmp/context.txt 2>/dev/null || echo "README not found" >> /tmp/context.txt
          echo "" >> /tmp/context.txt
          echo "=== src/main.py ===" >> /tmp/context.txt
          cat src/main.py >> /tmp/context.txt 2>/dev/null || echo "src/main.py not found" >> /tmp/context.txt
          echo "Context saved"

      - name: AI Code Review
        env:
          ANTHROPIC_BASE_URL: "https://ccc.210k.cc"
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
        run: |
          # 读取上下文和 diff
          CONTENT=$(cat /tmp/context.txt)
          DIFF=$(cat /tmp/pr_diff.txt)

          # 构建 JSON payload（使用单行避免复杂转义）
          USER_MSG="项目上下文：
$CONTENT

PR 改动（Diff）：
$DIFF

请审查以上 PR 改动，以 Markdown 格式输出审查意见。"

          # 将消息写入临时文件
          printf '%s' "$USER_MSG" > /tmp/user_msg.txt

          # 调用 Claude API
          RESPONSE=$(curl -s "$ANTHROPIC_BASE_URL/v1/messages" \
            -H "Authorization: Bearer $ANTHROPIC_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -H "anthropic-version: 2023-06-01" \
            -d '{
              "model": "claude-haiku-4-5-20251001",
              "max_tokens": 2000,
              "system": "你是一个资深的代码审查专家。请根据项目上下文理解项目架构和规范，然后审查 PR 改动。",
              "messages": [{"role": "user", "content": "'"$(cat /tmp/user_msg.txt | jq -Rs .)"'"}]
            }')

          # 提取回复
          AI_REVIEW=$(echo "$RESPONSE" | jq -r '.content[0].text // .error.message // .' 2>/dev/null)

          echo "=== AI Review Result ==="
          echo "$AI_REVIEW"
          echo "$AI_REVIEW" > /tmp/ai_review.txt

      - name: Post Review Comment
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          AI_REVIEW=$(cat /tmp/ai_review.txt)

          COMMENT_BODY="## 🤖 AI Code Review

${AI_REVIEW}

---
*This review was generated by AI*"

          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "$COMMENT_BODY"
